<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Miguel Gym Tracker 💪</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#070707;--s2:#161616;--s3:#1c1c1c;--acc:#f97316;--acc2:#fb923c;--txt:#f0f0f0;--muted:#555;--border:#222}
    body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
    .app{min-height:100vh}
    .hdr{background:rgba(7,7,7,.97);border-bottom:1px solid var(--border);padding:18px 20px 0;position:sticky;top:0;z-index:200;backdrop-filter:blur(24px)}
    .hdr-top{display:flex;align-items:center;gap:14px;margin-bottom:18px}
    .avatar{width:46px;height:46px;flex-shrink:0;background:linear-gradient(135deg,#f97316,#dc2626);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:20px;color:#fff;box-shadow:0 4px 20px rgba(249,115,22,.4)}
    .hdr-name{font-family:'Bebas Neue';font-size:26px;letter-spacing:2px;line-height:1}
    .hdr-sub{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
    .hdr-sub span{color:var(--acc)}
    .tabs{display:flex;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{padding:11px 18px;font-family:'Barlow Condensed';font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none}
    .tab:hover{color:var(--txt)}
    .tab.on{color:var(--acc);border-bottom-color:var(--acc)}
    .content{padding:20px;max-width:780px;margin:0 auto}
    .banner{background:linear-gradient(135deg,#130800,#1a0f00,#0d0d0d);border:1px solid rgba(249,115,22,.2);border-radius:18px;padding:22px 24px;margin-bottom:22px;position:relative;overflow:hidden}
    .banner::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 90% 50%,rgba(249,115,22,.08),transparent 60%);pointer-events:none}
    .banner-title{font-family:'Bebas Neue';font-size:26px;letter-spacing:3px;color:var(--acc);line-height:1}
    .banner-sub{font-size:13px;color:#7a4a1a;margin-top:5px;font-weight:500}
    .banner-emoji{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.2}
    .sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
    .sc{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden}
    .sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc),transparent)}
    .sc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:8px}
    .sc-val{font-family:'Bebas Neue';font-size:34px;color:var(--acc);letter-spacing:1px;line-height:1}
    .sc-unit{font-size:12px;color:var(--muted);margin-top:2px}
    .stitle{font-family:'Bebas Neue';font-size:16px;letter-spacing:3px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px}
    .stitle::after{content:'';flex:1;height:1px;background:var(--border)}
    .mchips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .mchip{padding:8px 14px;border-radius:8px;font-family:'Barlow Condensed';font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--s2);color:var(--muted);transition:all .2s}
    .mchip:hover{border-color:#333;color:var(--txt)}
    .mchip.on{color:#fff;border-color:transparent}
    .exrow{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;border-left:3px solid transparent}
    .ex-name{font-weight:600;font-size:14px;margin-bottom:3px}
    .ex-date{font-size:11px;color:var(--muted)}
    .badges{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
    .bw{background:rgba(249,115,22,.12);color:var(--acc);padding:5px 11px;border-radius:7px;font-family:'Barlow Condensed';font-weight:700;font-size:14px}
    .br{background:rgba(255,255,255,.04);color:#888;padding:5px 11px;border-radius:7px;font-family:'Barlow Condensed';font-weight:700;font-size:14px}
    .bvol{color:#444;font-size:11px;font-family:'Barlow Condensed';font-weight:600}
    .pr-badge{background:linear-gradient(135deg,#f97316,#dc2626);color:#fff;padding:2px 7px;border-radius:4px;font-size:10px;font-family:'Barlow Condensed';font-weight:700;letter-spacing:1px}
    .btn{padding:11px 22px;border-radius:9px;font-family:'Barlow Condensed';font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border:none;transition:all .2s}
    .btn-p{background:var(--acc);color:#fff}
    .btn-p:hover{background:var(--acc2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(249,115,22,.3)}
    .btn-g{background:transparent;color:var(--muted);border:1px solid var(--border)}
    .btn-g:hover{color:var(--txt);border-color:#333}
    .btn-full{width:100%;margin-bottom:22px;margin-top:6px}
    .fmodal{background:var(--s2);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:22px}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .fgrp{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
    .flabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
    .finput{background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--txt);font-family:'Barlow';font-size:14px;outline:none;transition:border-color .2s;width:100%}
    .finput:focus{border-color:var(--acc)}
    .finput option{background:var(--s3)}
    .fbtns{display:flex;gap:9px;justify-content:flex-end;margin-top:14px}
    .chart-box{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px}
    .chart-lbl{font-size:11px;color:var(--muted);font-family:'Barlow Condensed';letter-spacing:1.5px;font-weight:700;text-transform:uppercase;margin-bottom:12px}
    .psel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:22px}
    .psel-btn{padding:10px 13px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Barlow';font-size:13px;cursor:pointer;text-align:left;transition:all .2s}
    .psel-btn:hover,.psel-btn.on{border-color:var(--acc);color:var(--txt);background:rgba(249,115,22,.07)}
    .hdate-grp{margin-bottom:22px}
    .hdate-lbl{font-family:'Bebas Neue';font-size:15px;letter-spacing:2px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:10px}
    .hdate-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
    .empty{text-align:center;padding:52px 20px;color:var(--muted)}
    .empty-ico{font-size:52px;margin-bottom:14px}
    .empty-ttl{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;margin-bottom:6px;color:#333}
    .fab{position:fixed;bottom:26px;right:26px;width:54px;height:54px;background:var(--acc);border-radius:14px;border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 8px 32px rgba(249,115,22,.45);transition:all .2s;display:flex;align-items:center;justify-content:center;z-index:100}
    .fab:hover{transform:scale(1.1) rotate(8deg)}
    .mg-label{font-family:'Barlow Condensed';font-weight:800;font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
    .stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
    .tag-inicio{background:rgba(249,115,22,.1);color:var(--acc);padding:1px 7px;border-radius:4px;font-size:11px;font-family:'Barlow Condensed';font-weight:700;letter-spacing:1px}
    .del-btn{background:none;border:none;color:#333;cursor:pointer;font-size:14px;padding:4px 7px;border-radius:6px;transition:color .2s;line-height:1}
    .del-btn:hover{color:#ef4444}
    .tooltip{position:absolute;background:#161616;border:1px solid #2a2a2a;border-radius:8px;padding:7px 11px;font-size:12px;color:#f0f0f0;pointer-events:none;white-space:nowrap;z-index:50;transform:translateX(-50%)}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const SEED_DATE = "2026-03-23";
const INITIAL_DATA = [
  {muscleGroup:"ESPALDA",  exercise:"Jalón",                  weight:70,   reps:8 },
  {muscleGroup:"ESPALDA",  exercise:"Remo",                   weight:55,   reps:10},
  {muscleGroup:"ESPALDA",  exercise:"Deltoides trasero",       weight:40,   reps:10},
  {muscleGroup:"ESPALDA",  exercise:"Pull over",               weight:25,   reps:8 },
  {muscleGroup:"BÍCEPS",   exercise:"Máquina predicadora",     weight:27.5, reps:10},
  {muscleGroup:"BÍCEPS",   exercise:"Sentado vertical",        weight:42.5, reps:12},
  {muscleGroup:"BÍCEPS",   exercise:"Martillo",                weight:20,   reps:10},
  {muscleGroup:"PECHO",    exercise:"Press plano sentado",     weight:35,   reps:10},
  {muscleGroup:"PECHO",    exercise:"Press banca inclinado",   weight:24,   reps:9 },
  {muscleGroup:"PECHO",    exercise:"Aperturas",               weight:50,   reps:10},
  {muscleGroup:"PIERNAS",  exercise:"Aductor",                 weight:110,  reps:12},
  {muscleGroup:"PIERNAS",  exercise:"Abductor",                weight:95,   reps:12},
  {muscleGroup:"PIERNAS",  exercise:"Extensión",               weight:92.5, reps:10},
  {muscleGroup:"PIERNAS",  exercise:"Curl Femoral",            weight:87.5, reps:10},
  {muscleGroup:"PIERNAS",  exercise:"Jaca",                    weight:40,   reps:10},
  {muscleGroup:"PIERNAS",  exercise:"Prensa",                  weight:160,  reps:11},
  {muscleGroup:"HOMBRO",   exercise:"Elevaciones laterales",   weight:8,    reps:14},
  {muscleGroup:"HOMBRO",   exercise:"Elevación frontal polea", weight:15,   reps:12},
  {muscleGroup:"HOMBRO",   exercise:"Press Militar",           weight:20,   reps:10},
  {muscleGroup:"TRÍCEPS",  exercise:"Extensión triceps",       weight:27.5, reps:12},
  {muscleGroup:"TRÍCEPS",  exercise:"Ninja",                   weight:17.5, reps:10},
  {muscleGroup:"TRÍCEPS",  exercise:"Extensión máquina",       weight:47.5, reps:11},
];

const MG    = ["ESPALDA","BÍCEPS","PECHO","PIERNAS","HOMBRO","TRÍCEPS"];
const EMOJI = {ESPALDA:"🏋️",BÍCEPS:"💪",PECHO:"🫀",PIERNAS:"🦵",HOMBRO:"🎯",TRÍCEPS:"⚡"};
const COL   = {ESPALDA:"#f97316",BÍCEPS:"#ef4444",PECHO:"#3b82f6",PIERNAS:"#10b981",HOMBRO:"#8b5cf6",TRÍCEPS:"#f59e0b"};
const EXLIB = INITIAL_DATA.reduce((a,d)=>{ (a[d.muscleGroup]=a[d.muscleGroup]||[]).push(d.exercise); return a; },{});

const fmt   = s => new Date(s+"T00:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"2-digit"});
const lsGet = k => { try{return localStorage.getItem(k)}catch(e){return null} };
const lsSet = (k,v) => { try{localStorage.setItem(k,v)}catch(e){} };

/* ── SVG LINE CHART ── */
function LineChart({data, dataKey, color, label, unit}) {
  const [tip, setTip] = useState(null);
  const W = 600, H = 160, PL = 40, PR = 16, PT = 16, PB = 30;
  const iW = W - PL - PR, iH = H - PT - PB;
  if (!data || data.length < 2) return null;
  const vals = data.map(d => d[dataKey]);
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const range = maxV - minV || 1;
  const px = i => PL + (i / (data.length - 1)) * iW;
  const py = v => PT + iH - ((v - minV) / range) * iH;
  const pts = data.map((d,i) => `${px(i)},${py(d[dataKey])}`).join(" ");
  const area = `M${px(0)},${py(data[0][dataKey])} ` + data.map((d,i) => `L${px(i)},${py(d[dataKey])}`).join(" ") + ` L${px(data.length-1)},${PT+iH} L${px(0)},${PT+iH} Z`;
  const gid = "g"+dataKey+color.replace("#","");
  return (
    <div className="chart-box">
      <div className="chart-lbl">{label}</div>
      <div style={{position:"relative"}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block"}}>
          <defs>
            <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          {[0,0.5,1].map(t => {
            const y = PT + iH * (1 - t);
            const v = Math.round(minV + range * t);
            return (
              <g key={t}>
                <line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#1c1c1c" strokeWidth="1"/>
                <text x={PL-6} y={y+4} textAnchor="end" fill="#444" fontSize="9">{v}</text>
              </g>
            );
          })}
          {data.map((d,i) => {
            const step = Math.ceil(data.length / 5);
            if (i % step !== 0 && i !== data.length-1) return null;
            return <text key={i} x={px(i)} y={H-6} textAnchor="middle" fill="#444" fontSize="9">{d.date}</text>;
          })}
          <path d={area} fill={`url(#${gid})`}/>
          <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
          {data.map((d,i) => (
            <circle key={i} cx={px(i)} cy={py(d[dataKey])} r="4" fill={color} stroke="#161616" strokeWidth="2"
              style={{cursor:"pointer"}}
              onMouseEnter={e => setTip({x:px(i), val:d[dataKey], label:d.date, idx:i})}
              onMouseLeave={() => setTip(null)}/>
          ))}
        </svg>
        {tip && (
          <div className="tooltip" style={{left:`${(tip.x/W*100)}%`, top:0}}>
            {tip.label}: <strong style={{color}}>{tip.val}{unit}</strong>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const today = new Date().toISOString().split("T")[0];
  const [tab,     setTab]     = useState("dashboard");
  const [works,   setWorks]   = useState([]);
  const [bws,     setBws]     = useState([]);
  const [muscle,  setMuscle]  = useState("ESPALDA");
  const [showAdd, setShowAdd] = useState(false);
  const [showBW,  setShowBW]  = useState(false);
  const [selProg, setSelProg] = useState("");
  const [form,    setForm]    = useState({muscleGroup:"ESPALDA",exercise:"",weight:"",reps:"",date:today});
  const [bwForm,  setBwForm]  = useState({weight:"",date:today});

  useEffect(() => {
    if (!lsGet("mg2-init")) {
      const seed = INITIAL_DATA.map((d,i) => ({id:"s"+i, date:SEED_DATE, ...d}));
      lsSet("mg2-works", JSON.stringify(seed));
      lsSet("mg2-init",  "1");
      setWorks(seed);
    } else {
      const w = lsGet("mg2-works"); if (w) setWorks(JSON.parse(w));
    }
    const b = lsGet("mg2-bw"); if (b) setBws(JSON.parse(b));
  }, []);

  const saveW = l => { setWorks(l); lsSet("mg2-works", JSON.stringify(l)); };
  const saveB = l => { setBws(l);  lsSet("mg2-bw",    JSON.stringify(l)); };

  const addWork = () => {
    if (!form.exercise || !form.weight || !form.reps) return;
    saveW([...works, {id:Date.now()+"", date:form.date, muscleGroup:form.muscleGroup, exercise:form.exercise, weight:parseFloat(form.weight), reps:parseInt(form.reps)}]);
    setShowAdd(false);
    setForm({muscleGroup:"ESPALDA",exercise:"",weight:"",reps:"",date:today});
  };
  const addBW = () => {
    if (!bwForm.weight) return;
    saveB([...bws, {id:Date.now()+"", date:bwForm.date, weight:parseFloat(bwForm.weight)}]);
    setShowBW(false);
    setBwForm({weight:"",date:today});
  };
  const delW = id => saveW(works.filter(w => w.id !== id));
  const delB = id => saveB(bws.filter(b => b.id !== id));

  const getPR = ex => {
    const r = works.filter(w => w.exercise === ex);
    return r.length ? r.reduce((m,w) => w.weight > m.weight ? w : m) : null;
  };
  const getLatest = () => {
    const m = {};
    works.forEach(w => { if (!m[w.exercise] || w.date > m[w.exercise].date) m[w.exercise] = w; });
    return Object.values(m);
  };
  const getProgress = ex =>
    works.filter(w => w.exercise === ex)
      .sort((a,b) => a.date.localeCompare(b.date))
      .map(w => ({date:w.date.slice(5), weight:w.weight, volume:Math.round(w.weight*w.reps)}));

  const totalVol    = works.reduce((s,w) => s + w.weight*w.reps, 0);
  const sessions    = new Set(works.map(w => w.date)).size;
  const latestBW    = bws.length ? [...bws].sort((a,b) => b.date.localeCompare(a.date))[0] : null;
  const allEx       = [...new Set(works.map(w => w.exercise))].sort();
  const muscleEx    = [...new Set(works.filter(w => w.muscleGroup===muscle).map(w => w.exercise))];
  const byDate      = works.reduce((a,w) => { (a[w.date]=a[w.date]||[]).push(w); return a; }, {});
  const sortedDates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));
  const latestRecs  = getLatest();
  const progData    = selProg ? getProgress(selProg) : [];
  const bwChartData = [...bws].sort((a,b) => a.date.localeCompare(b.date)).map(b => ({date:b.date.slice(5), weight:b.weight}));

  return (
    <div className="app">
      <div className="hdr">
        <div className="hdr-top">
          <div className="avatar">MG</div>
          <div>
            <div className="hdr-name">MIGUEL GYM</div>
            <div className="hdr-sub">🔥 <span>Beast Mode</span> · Tracker Personal</div>
          </div>
        </div>
        <div className="tabs">
          {[["dashboard","📊"],["ejercicios","💪"],["progreso","📈"],["historial","📅"]].map(([t,ic]) => (
            <button key={t} className={"tab"+(tab===t?" on":"")} onClick={()=>setTab(t)}>{ic} {t}</button>
          ))}
        </div>
      </div>

      <div className="content">

        {/* DASHBOARD */}
        {tab==="dashboard" && (
          <div>
            <div className="banner" style={{marginTop:6}}>
              <div className="banner-emoji">🔥</div>
              <div className="banner-title">¡VAMOS MIGUE! 💪</div>
              <div className="banner-sub">Cada rep cuenta · Cada kilo suma · Sigue machacando</div>
            </div>

            <div className="sgrid">
              <div className="sc">
                <div className="sc-label">Registros totales</div>
                <div className="sc-val">{works.length}</div>
              </div>
              <div className="sc">
                <div className="sc-label">Días entrenados</div>
                <div className="sc-val">{sessions}</div>
              </div>
              <div className="sc">
                <div className="sc-label">Volumen total</div>
                <div className="sc-val" style={{fontSize:28}}>{(totalVol/1000).toFixed(1)}k</div>
                <div className="sc-unit">kg totales movidos</div>
              </div>
              <div className="sc" onClick={()=>setShowBW(v=>!v)} style={{cursor:"pointer"}}>
                <div className="sc-label">Mi peso 👆 toca</div>
                <div className="sc-val">{latestBW ? latestBW.weight : "—"}</div>
                <div className="sc-unit">{latestBW ? "kg · "+fmt(latestBW.date) : "para añadir"}</div>
              </div>
            </div>

            {showBW && (
              <div className="fmodal">
                <div className="stitle">PESO CORPORAL</div>
                <div className="frow">
                  <div className="fgrp">
                    <label className="flabel">Peso (kg)</label>
                    <input className="finput" type="number" step="0.1" placeholder="75.5"
                      value={bwForm.weight} onChange={e=>setBwForm({...bwForm,weight:e.target.value})}/>
                  </div>
                  <div className="fgrp">
                    <label className="flabel">Fecha</label>
                    <input className="finput" type="date" value={bwForm.date}
                      onChange={e=>setBwForm({...bwForm,date:e.target.value})}/>
                  </div>
                </div>
                <div className="fbtns">
                  <button className="btn btn-g" onClick={()=>setShowBW(false)}>Cancelar</button>
                  <button className="btn btn-p" onClick={addBW}>Guardar</button>
                </div>
                {bws.length > 0 && (
                  <div style={{marginTop:18}}>
                    <div className="stitle">HISTORIAL</div>
                    {[...bws].sort((a,b)=>b.date.localeCompare(a.date)).map(b=>(
                      <div className="exrow" key={b.id} style={{borderLeftColor:"#f97316"}}>
                        <div className="ex-date" style={{fontSize:13,color:"#aaa"}}>{fmt(b.date)}</div>
                        <div className="badges">
                          <span className="bw">{b.weight} kg</span>
                          <button className="del-btn" onClick={()=>delB(b.id)}>✕</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {bwChartData.length > 1 && (
              <div>
                <div className="stitle">EVOLUCIÓN DE PESO</div>
                <LineChart data={bwChartData} dataKey="weight" color="#f97316" label="Peso corporal (kg)" unit=" kg"/>
              </div>
            )}

            <div className="stitle">ÚLTIMO REGISTRO POR GRUPO</div>
            {MG.map(mg => {
              const recs = latestRecs.filter(w => w.muscleGroup===mg);
              if (!recs.length) return null;
              return (
                <div key={mg} style={{marginBottom:20}}>
                  <div className="mg-label" style={{color:COL[mg]}}>{EMOJI[mg]} {mg}</div>
                  {recs.map(w => {
                    const pr=getPR(w.exercise), isPR=pr&&pr.id===w.id;
                    return (
                      <div className="exrow" key={w.id} style={{borderLeftColor:COL[mg]}}>
                        <div>
                          <div className="ex-name">{w.exercise}</div>
                          <div className="ex-date">{fmt(w.date)}</div>
                        </div>
                        <div className="badges">
                          {isPR && <span className="pr-badge">🏆 PR</span>}
                          <span className="bw">{w.weight} kg</span>
                          <span className="br">{w.reps} reps</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}

        {/* EJERCICIOS */}
        {tab==="ejercicios" && (
          <div>
            {showAdd ? (
              <div className="fmodal" style={{marginTop:6}}>
                <div className="stitle">AÑADIR REGISTRO</div>
                <div className="fgrp">
                  <label className="flabel">Grupo muscular</label>
                  <select className="finput" value={form.muscleGroup}
                    onChange={e=>setForm({...form,muscleGroup:e.target.value,exercise:""})}>
                    {MG.map(mg=><option key={mg}>{mg}</option>)}
                  </select>
                </div>
                <div className="fgrp">
                  <label className="flabel">Ejercicio</label>
                  <input className="finput" list="exlist" placeholder="Nombre del ejercicio"
                    value={form.exercise} onChange={e=>setForm({...form,exercise:e.target.value})}/>
                  <datalist id="exlist">
                    {(EXLIB[form.muscleGroup]||[]).map(ex=><option key={ex} value={ex}/>)}
                  </datalist>
                </div>
                <div className="frow">
                  <div className="fgrp">
                    <label className="flabel">Peso (kg)</label>
                    <input className="finput" type="number" step="0.5" placeholder="70"
                      value={form.weight} onChange={e=>setForm({...form,weight:e.target.value})}/>
                  </div>
                  <div className="fgrp">
                    <label className="flabel">Repeticiones</label>
                    <input className="finput" type="number" placeholder="10"
                      value={form.reps} onChange={e=>setForm({...form,reps:e.target.value})}/>
                  </div>
                </div>
                <div className="fgrp">
                  <label className="flabel">Fecha</label>
                  <input className="finput" type="date" value={form.date}
                    onChange={e=>setForm({...form,date:e.target.value})}/>
                </div>
                <div className="fbtns">
                  <button className="btn btn-g" onClick={()=>setShowAdd(false)}>Cancelar</button>
                  <button className="btn btn-p" onClick={addWork}>💾 Guardar</button>
                </div>
              </div>
            ) : (
              <button className="btn btn-p btn-full" onClick={()=>setShowAdd(true)}>+ Añadir nuevo registro</button>
            )}

            <div className="mchips">
              {MG.map(mg=>(
                <button key={mg} className={"mchip"+(muscle===mg?" on":"")}
                  style={muscle===mg?{background:COL[mg]}:{}}
                  onClick={()=>setMuscle(mg)}>
                  {EMOJI[mg]} {mg}
                </button>
              ))}
            </div>

            {muscleEx.length===0 ? (
              <div className="empty">
                <div className="empty-ico">🏋️</div>
                <div className="empty-ttl">Sin registros</div>
                <div>Añade tu primer ejercicio de {muscle}</div>
              </div>
            ) : muscleEx.map(ex => {
              const recs = works.filter(w=>w.exercise===ex&&w.muscleGroup===muscle).sort((a,b)=>b.date.localeCompare(a.date));
              const pr   = getPR(ex);
              return (
                <div key={ex} style={{marginBottom:22}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <span style={{fontFamily:"'Barlow Condensed'",fontWeight:700,fontSize:15,letterSpacing:1}}>{ex}</span>
                    {pr && <span className="pr-badge">🏆 PR: {pr.weight} kg</span>}
                    <span style={{color:"#333",fontSize:12}}>{recs.length} entradas</span>
                  </div>
                  {recs.slice(0,5).map((w,i)=>(
                    <div className="exrow" key={w.id} style={{borderLeftColor:COL[muscle],opacity:i===0?1:0.6}}>
                      <div className="ex-date" style={{fontSize:13,color:i===0?"#aaa":"#555"}}>
                        {fmt(w.date)}
                        {i===0 && <span style={{color:COL[muscle],marginLeft:6,fontSize:10,fontWeight:700}}> ÚLTIMO</span>}
                      </div>
                      <div className="badges">
                        <span className="bw">{w.weight} kg</span>
                        <span className="br">{w.reps} reps</span>
                        <span className="bvol">VOL {w.weight*w.reps}</span>
                        <button className="del-btn" onClick={()=>delW(w.id)}>✕</button>
                      </div>
                    </div>
                  ))}
                  {recs.length>5 && <div style={{fontSize:11,color:"#333",marginTop:4}}>+{recs.length-5} registros anteriores</div>}
                </div>
              );
            })}
          </div>
        )}

        {/* PROGRESO */}
        {tab==="progreso" && (
          <div style={{marginTop:6}}>
            <div className="stitle">ELIGE EJERCICIO</div>
            <div className="psel-grid">
              {allEx.map(ex=>(
                <button key={ex} className={"psel-btn"+(selProg===ex?" on":"")} onClick={()=>setSelProg(ex)}>{ex}</button>
              ))}
            </div>

            {selProg && progData.length > 0 && (
              <div>
                <div className="stitle">{selProg}</div>
                {progData.length === 1 ? (
                  <div className="chart-box" style={{textAlign:"center",padding:"36px 20px"}}>
                    <div style={{fontSize:44,marginBottom:14}}>📊</div>
                    <div style={{fontFamily:"'Barlow Condensed'",letterSpacing:2,color:"#888"}}>
                      PRIMER REGISTRO: {progData[0].weight} kg
                    </div>
                    <div style={{fontSize:12,color:"#444",marginTop:8}}>Añade más registros para ver la evolución</div>
                  </div>
                ) : (
                  <div>
                    <LineChart data={progData} dataKey="weight" color="#f97316" label="Peso levantado (kg)" unit=" kg"/>
                    <LineChart data={progData} dataKey="volume" color="#3b82f6" label="Volumen total (kg × reps)" unit=""/>
                    <div className="stats3">
                      {(()=>{
                        const f=progData[0].weight, l=progData[progData.length-1].weight;
                        const d=Math.round((l-f)*10)/10;
                        return [
                          {label:"Inicio",   val:f+" kg",                       col:"#f97316"},
                          {label:"Actual",   val:l+" kg",                       col:"#f97316"},
                          {label:"Progreso", val:(d>=0?"+":"")+d+" kg",         col:d>=0?"#22c55e":"#ef4444"},
                        ].map(s=>(
                          <div className="sc" key={s.label}>
                            <div className="sc-label">{s.label}</div>
                            <div style={{fontFamily:"'Bebas Neue'",fontSize:24,color:s.col,letterSpacing:1}}>{s.val}</div>
                          </div>
                        ));
                      })()}
                    </div>
                  </div>
                )}
              </div>
            )}

            {!selProg && (
              <div className="empty">
                <div className="empty-ico">📈</div>
                <div className="empty-ttl">Selecciona un ejercicio</div>
                <div style={{fontSize:13}}>para ver tu evolución</div>
              </div>
            )}
          </div>
        )}

        {/* HISTORIAL */}
        {tab==="historial" && (
          <div style={{marginTop:6}}>
            {sortedDates.length===0 && (
              <div className="empty">
                <div className="empty-ico">📅</div>
                <div className="empty-ttl">Sin registros aún</div>
              </div>
            )}
            {sortedDates.map(date=>(
              <div className="hdate-grp" key={date}>
                <div className="hdate-lbl">
                  {fmt(date)}
                  {date===SEED_DATE && <span className="tag-inicio">INICIO</span>}
                </div>
                {byDate[date].map(w=>{
                  const pr=getPR(w.exercise), isPR=pr&&pr.id===w.id;
                  return (
                    <div className="exrow" key={w.id} style={{borderLeftColor:COL[w.muscleGroup]||"#444"}}>
                      <div>
                        <div className="ex-name">{w.exercise}</div>
                        <div style={{fontSize:11,color:COL[w.muscleGroup],fontFamily:"'Barlow Condensed'",letterSpacing:1,fontWeight:700}}>
                          {EMOJI[w.muscleGroup]} {w.muscleGroup}
                        </div>
                      </div>
                      <div className="badges">
                        {isPR && <span className="pr-badge">🏆 PR</span>}
                        <span className="bw">{w.weight} kg</span>
                        <span className="br">{w.reps} reps</span>
                        <button className="del-btn" onClick={()=>delW(w.id)}>✕</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}

        <div style={{height:80}}/>
      </div>

      {tab!=="ejercicios" && (
        <button className="fab" onClick={()=>{setTab("ejercicios");setShowAdd(true);}}>+</button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
